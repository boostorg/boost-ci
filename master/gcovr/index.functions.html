<!DOCTYPE html>
<html class="theme-green">

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>Functions - boost-ci</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script>
      // Apply theme and font size immediately to prevent flash
      (function() {
        document.documentElement.classList.add('no-transitions');

        var saved = localStorage.getItem('gcovr-theme');
        var theme = (saved === 'light' || saved === 'dark') ? saved
          : window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);

      })();
    </script>
    <style type="text/css">
/* ===========================================
   GCOVR Custom Theme - Boost Brand
   =========================================== */

@charset "utf-8";

:root {
  /* ===========================================
     Brand Colors (from Boost website mockup)
     =========================================== */
  --brand-gold: #C9A227;
  --brand-gold-hover: #B8922A;
  --brand-gold-light: #F5EBBC;
  --brand-teal: #1F7788;
  --brand-teal-light: #A7F7E8;

  /* ===========================================
     Dark Theme (default)
     =========================================== */

  /* Backgrounds */
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-hover: #30363d;
  --bg-active: rgba(88, 166, 255, 0.15);

  /* Text */
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;

  /* Borders */
  --border-color: #30363d;
  --border-muted: #21262d;

  /* Accent colors */
  --accent-brand: var(--brand-gold);
  --accent-link: var(--brand-teal-light);
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-yellow: #d29922;
  --accent-red: #f85149;
  --accent-purple: #a371f7;

  /* Coverage colors */
  --coverage-high: #3fb950;
  --coverage-high-bg: rgba(63, 185, 80, 0.15);
  --coverage-medium: #d29922;
  --coverage-medium-bg: rgba(210, 153, 34, 0.15);
  --coverage-low: #f85149;
  --coverage-low-bg: rgba(248, 81, 73, 0.15);
  --coverage-unknown: #6e7681;

  /* Buttons */
  --btn-primary-bg: var(--brand-gold);
  --btn-primary-text: #0d1117;
  --btn-primary-hover: var(--brand-gold-hover);
  --btn-secondary-bg: var(--bg-tertiary);
  --btn-secondary-text: var(--text-primary);
  --btn-secondary-hover: var(--bg-hover);

  /* Tags/Pills */
  --tag-bg: var(--bg-tertiary);
  --tag-text: var(--text-secondary);

  /* Code */
  --code-bg: var(--bg-secondary);
  --code-keyword: var(--brand-teal-light);
  --code-string: #a5d6ff;

  /* ===========================================
     Layout
     =========================================== */
  --sidebar-width: 320px;
  --sidebar-collapsed-width: 64px;
  --header-height: 56px;

  /* ===========================================
     Typography
     =========================================== */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', Consolas, 'Liberation Mono', Menlo, monospace;

  /* Font sizes - base scale (can be adjusted via JS) */
  --font-size-base: 16px;
  --font-size-xs: calc(var(--font-size-base) * 0.75);
  --font-size-sm: calc(var(--font-size-base) * 0.867);
  --font-size-md: var(--font-size-base);
  --font-size-lg: calc(var(--font-size-base) * 1.067);
  --font-size-xl: calc(var(--font-size-base) * 1.2);
  --font-size-code: calc(var(--font-size-base) * 0.9375);

  /* ===========================================
     Radius
     =========================================== */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-pill: 20px;

  /* ===========================================
     Transitions
     =========================================== */
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
}

/* ===========================================
   Light Mode
   =========================================== */
:root[data-theme="light"] {
  /* Backgrounds */
  --bg-primary: #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-tertiary: #eaeef2;
  --bg-hover: #e5e9ed;
  --bg-active: rgba(88, 166, 255, 0.15);

  /* Text */
  --text-primary: #1f2328;
  --text-secondary: #656d76;
  --text-muted: #8c959f;

  /* Borders */
  --border-color: #d0d7de;
  --border-muted: #eaeef2;

  /* Accent colors */
  --accent-brand: #9A7B1A;
  --accent-link: var(--brand-teal);
  --accent-blue: #0969da;
  --accent-green: #1a7f37;
  --accent-yellow: #9a6700;
  --accent-red: #cf222e;
  --accent-purple: #8250df;

  /* Coverage colors */
  --coverage-high: #1a7f37;
  --coverage-high-bg: rgba(26, 127, 55, 0.15);
  --coverage-medium: #9a6700;
  --coverage-medium-bg: rgba(154, 103, 0, 0.15);
  --coverage-low: #cf222e;
  --coverage-low-bg: rgba(207, 34, 46, 0.15);

  /* Buttons */
  --btn-primary-bg: var(--accent-brand);
  --btn-primary-text: #ffffff;
  --btn-primary-hover: #7A6115;
  --btn-secondary-bg: var(--bg-tertiary);
  --btn-secondary-text: var(--text-primary);
  --btn-secondary-hover: var(--bg-hover);

  /* Tags/Pills */
  --tag-bg: var(--bg-tertiary);
  --tag-text: var(--text-secondary);

  /* Code */
  --code-bg: var(--bg-secondary);
  --code-keyword: var(--brand-teal);
  --code-string: #0550ae;
}

/* Suppress transitions on initial load to prevent flash */
html.no-transitions,
html.no-transitions *,
html.no-transitions *::before,
html.no-transitions *::after {
  transition: none !important;
}

/* Smooth theme transitions */
body, .sidebar, .main-content, .main-header, .main-footer,
.sidebar-header, .sidebar-nav,
.summary-card, .file-list-container, .source-container,
.tree-item-header, .coverage-badge, .tree-coverage,
.btn, .nav-link, input {
  transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
}

/* Coverage class colors */
.coverage-high { color: var(--coverage-high) !important; }
.coverage-medium { color: var(--coverage-medium) !important; }
.coverage-low, .coverage-none { color: var(--coverage-low) !important; }
.coverage-unknown { color: var(--coverage-unknown) !important; }

/* Reset */
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  font-size: var(--font-size-md);
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-primary);
  overflow-x: hidden;
}

a {
  color: var(--accent-blue);
  text-decoration: none;
  transition: color var(--transition-fast);
}

a:hover {
  color: #79c0ff;
  text-decoration: underline;
}

/* ===========================================
   App Layout
   =========================================== */

.app-container {
  display: flex;
  min-height: 100vh;
}

/* ===========================================
   Sidebar
   =========================================== */

.sidebar {
  position: fixed;
  left: 12px;
  top: 12px;
  bottom: 12px;
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow: visible;
  transition: width var(--transition-normal);
}

/* Collapsed state */
.sidebar.collapsed {
  width: var(--sidebar-collapsed-width);
  overflow: visible;
}

/* Expand on hover when collapsed - only for content area, not header */
.sidebar.collapsed.hover-expand {
  width: var(--sidebar-width);
}

/* Sidebar Resize Handle */
.sidebar-resize-handle {
  position: absolute;
  top: 0;
  left: 100%;
  width: 29px;
  height: 100%;
  cursor: col-resize;
  z-index: 101;
}

.sidebar-resize-handle::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  width: 5px;
  height: 100%;
  border-radius: 2.5px;
  background: var(--bg-tertiary);
  transform: translateX(-50%);
  transition: background var(--transition-fast);
}

.sidebar-resize-handle:hover::after {
  background: var(--border-color);
}

.sidebar.collapsed .sidebar-resize-handle {
  display: none;
}

body.sidebar-resizing {
  user-select: none;
  cursor: col-resize;
}

body.sidebar-resizing .sidebar,
body.sidebar-resizing .main-content {
  transition: none;
}

/* Sidebar Header */
.sidebar-header {
  display: flex;
  flex-direction: column;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-color);
  gap: 4px;
  flex-shrink: 0;
}

.sidebar-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  text-decoration: none;
  min-width: 0;
  flex: 0 1 auto;
}

.sidebar-logo:hover {
  text-decoration: none;
}

.sidebar-logo:hover .boost-logo {
  transform: scale(1.05);
}

.sidebar-logo .boost-wordmark {
  height: 28px;
  width: auto;
  flex-shrink: 0;
  transition: transform var(--transition-fast);
  color: var(--text-primary);
}

/* Light mode: dark text for wordmark */
:root[data-theme="light"] .sidebar-logo .boost-wordmark {
  color: #050816;
}

.sidebar-title-group {
  display: flex;
  align-items: baseline;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
}

.sidebar-library {
  font-size: var(--font-size-xl);
  font-weight: 600;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar-subtitle {
  font-size: var(--font-size-sm);
  font-weight: 400;
  color: var(--text-muted);
  flex-shrink: 0;
}

.sidebar.collapsed .sidebar-title-group {
  display: none;
}

.sidebar.collapsed.hover-expand .sidebar-title-group {
  display: flex;
}

/* Hide logo when collapsed, center toggle (show on hover) */
.sidebar.collapsed .sidebar-logo {
  display: none;
}

.sidebar.collapsed.hover-expand .sidebar-logo {
  display: flex;
}

.sidebar.collapsed:not(.hover-expand) .sidebar-header {
  padding: 10px;
  align-items: center;
}

.sidebar.collapsed:not(.hover-expand) .sidebar-header-row {
  justify-content: center;
  width: 100%;
}

.sidebar.collapsed .sidebar-logo {
  display: none;
}

.sidebar.collapsed.hover-expand .sidebar-header-row {
  justify-content: space-between;
}

.sidebar.collapsed.hover-expand .sidebar-logo {
  display: flex;
}


/* Sidebar Toggle Button */
.sidebar-toggle {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  padding: 0;
  flex-shrink: 0;
}

.sidebar-toggle:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

.sidebar-toggle svg {
  width: 14px;
  height: 14px;
}

.sidebar-toggle .icon-expand { display: none; }
.sidebar-toggle .icon-collapse { display: block; }

.sidebar.collapsed .sidebar-toggle .icon-expand { display: block; }
.sidebar.collapsed .sidebar-toggle .icon-collapse { display: none; }

/* Sidebar Search */
.sidebar-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
  position: relative;
}

.sidebar-search input {
  width: 100%;
  padding: 8px 28px 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: var(--font-size-sm);
  outline: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}

.search-clear {
  position: absolute;
  right: 22px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
  border-radius: var(--radius-sm);
  display: none;
}

.search-clear:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
}

.sidebar-search.has-query .search-clear {
  display: block;
}

.sidebar-search input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
}

.sidebar-search input::placeholder {
  color: var(--text-muted);
}

.search-highlight {
  background: var(--accent-yellow, #e3b341);
  color: var(--bg-primary);
  border-radius: 2px;
  padding: 0 1px;
}

.search-no-results {
  padding: 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: var(--font-size-sm);
}

/* Hide elements when collapsed (show on hover) */
.sidebar.collapsed .sidebar-search,
.sidebar.collapsed .tree-controls,
.sidebar.collapsed .sidebar-nav {
  opacity: 0;
  pointer-events: none;
}

.sidebar.collapsed.hover-expand .sidebar-search,
.sidebar.collapsed.hover-expand .tree-controls,
.sidebar.collapsed.hover-expand .sidebar-nav {
  opacity: 1;
  pointer-events: auto;
}

/* Theme Toggle (in header) */
.theme-toggle {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  padding: 0;
  flex-shrink: 0;
}

.theme-toggle:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.theme-toggle svg {
  width: 18px;
  height: 18px;
}

/* Theme icons - visibility managed by JS */
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: none; }

/* Theme Selector Dropdown */

/* Tree Controls */
.tree-controls {
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-color);
}

.tree-control-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: var(--font-size-xs);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.tree-control-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.tree-control-btn svg {
  width: 12px;
  height: 12px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
  padding: 8px 0;
  scrollbar-gutter: stable;
}


.coverage-summary-mini {
  display: flex;
  align-items: center;
  gap: 8px;
}

.coverage-badge {
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: var(--font-size-sm);
}

.coverage-badge.coverage-high {
  background: var(--coverage-high-bg);
}

.coverage-badge.coverage-medium {
  background: var(--coverage-medium-bg);
}

.coverage-badge.coverage-low {
  background: var(--coverage-low-bg);
}

.coverage-label {
  color: var(--text-secondary);
  font-size: var(--font-size-xs);
}

/* Tree View */
.tree-loading {
  padding: 16px;
  color: var(--text-muted);
  font-size: var(--font-size-sm);
}

.tree-item {
  user-select: none;
}

.tree-item-header {
  display: flex;
  align-items: center;
  padding: 2px 12px 2px 8px;
  cursor: pointer;
  transition: background var(--transition-fast);
  gap: 4px;
  /* Extend background full width */
  margin-left: -200px;
  padding-left: 208px;
  margin-right: -12px;
  padding-right: 24px;
}

.tree-item-header:hover {
  background: var(--bg-hover);
}

.tree-item-header.active,
.tree-item.active > .tree-item-header {
  background: var(--bg-active);
}

.tree-item.active > .tree-item-header .tree-label {
  color: var(--accent-blue);
  font-weight: 500;
}

/* Folder toggle button (+/-) - minimal style */
.tree-folder-toggle {
  width: 16px;
  height: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: var(--font-size-xs);
  font-weight: 400;
  font-family: var(--font-mono);
  flex-shrink: 0;
  cursor: pointer;
  transition: color var(--transition-fast);
  text-decoration: none;
  line-height: 1;
  margin-right: 2px;
  padding: 0;
}

.tree-folder-toggle:hover {
  color: var(--text-primary);
  text-decoration: none;
}

/* Spacer for files (no toggle) */
.tree-spacer {
  width: 20px;
  flex-shrink: 0;
}

/* Legacy toggle classes */
.tree-toggle {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: var(--font-size-xs);
  font-weight: 600;
  font-family: var(--font-mono);
  flex-shrink: 0;
  cursor: pointer;
  transition: all var(--transition-fast);
  padding: 0;
  line-height: 1;
  text-decoration: none;
}

.tree-toggle:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--accent-blue);
  text-decoration: none;
}

.tree-toggle .toggle-icon {
  display: block;
  color: var(--text-primary);
  font-size: var(--font-size-md);
  line-height: 1;
}

.tree-toggle-spacer {
  width: 18px;
  flex-shrink: 0;
}

.tree-item.no-children .tree-toggle {
  visibility: hidden;
}

.tree-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.tree-icon-folder {
  color: var(--accent-blue);
}

.tree-icon-file {
  color: var(--text-muted);
}

/* Legacy classes */
.tree-icon.folder {
  color: var(--accent-blue);
}

.tree-icon.file {
  color: var(--text-secondary);
}

.tree-label {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: var(--font-size-md);
  color: var(--text-primary);
}

.tree-coverage {
  font-size: var(--font-size-xs);
  font-weight: 600;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

.tree-coverage.coverage-high {
  background: var(--coverage-high-bg);
}

.tree-coverage.coverage-medium {
  background: var(--coverage-medium-bg);
}

.tree-coverage.coverage-low {
  background: var(--coverage-low-bg);
}

.tree-children {
  display: none;
  margin-left: 20px;
  position: relative;
}

.tree-item.expanded > .tree-children {
  display: block;
}

/* .tree-children-inner reserved for animation support */


/* ===========================================
   Main Content
   =========================================== */

.main-content {
  flex: 1;
  margin-left: calc(var(--sidebar-width) + 41px);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: margin-left var(--transition-normal);
}

.sidebar.collapsed ~ .main-content {
  margin-left: calc(var(--sidebar-collapsed-width) + 41px);
}

.main-header {
  position: sticky;
  top: 12px;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 12px 12px 0 0;
  padding: 12px 10px 12px 24px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  height: var(--header-height);
}


.breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  font-size: var(--font-size-md);
  color: var(--text-secondary);
  white-space: nowrap;
}

.breadcrumb a,
.breadcrumb span {
  display: inline;
  white-space: nowrap;
}

.breadcrumb a {
  color: var(--accent-blue);
}

.breadcrumb a:hover {
  color: var(--accent-blue);
}

.breadcrumb .separator {
  color: var(--text-muted);
  padding: 0 6px;
}

.breadcrumb .current {
  color: var(--text-primary);
  visibility: hidden;
}

.breadcrumb .current.ready {
  visibility: visible;
}

.breadcrumb-home {
  font-weight: 600;
  color: var(--accent-brand);
}

.breadcrumb-home:hover {
  color: var(--accent-brand);
  opacity: 0.8;
  text-decoration: none;
}

.breadcrumb-title {
  font-weight: 600;
  font-size: var(--font-size-lg);
  color: var(--text-primary);
  margin-right: 8px;
}

.breadcrumb-label {
  font-weight: 400;
  font-size: var(--font-size-md);
  color: var(--text-secondary);
}

.header-actions {
  margin-left: auto;
}

.content-wrapper {
  flex: 1;
  padding: 24px;
  padding-right: 12px;
  padding-left: 0;
  width: 100%;
  margin-left: 0;
}

.main-footer {
  padding: 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: var(--font-size-xs);
  border-top: 1px solid var(--border-color);
}

.main-footer a {
  color: var(--text-muted);
}

/* ===========================================
   Summary Cards
   =========================================== */

.summary-section {
  margin-bottom: 24px;
}

.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}

.summary-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.summary-card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-tertiary);
}

.summary-card-header h3 {
  margin: 0;
  font-size: var(--font-size-xs);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.summary-card-body {
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.coverage-ring {
  position: relative;
  width: 72px;
  height: 72px;
  flex-shrink: 0;
}

.coverage-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.coverage-ring .ring-bg {
  fill: none;
  stroke: var(--bg-tertiary);
  stroke-width: 3;
}

.coverage-ring .ring-fill {
  fill: none;
  stroke: currentColor;
  stroke-width: 3;
  stroke-linecap: round;
  transition: stroke-dasharray var(--transition-normal);
}

.coverage-ring.coverage-high .ring-fill { stroke: var(--coverage-high); }
.coverage-ring.coverage-medium .ring-fill { stroke: var(--coverage-medium); }
.coverage-ring.coverage-low .ring-fill { stroke: var(--coverage-low); }

.coverage-ring .ring-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: var(--font-size-md);
  font-weight: 600;
}

.summary-stats {
  flex: 1;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: var(--font-size-sm);
}

.stat-row .stat-label {
  color: var(--text-secondary);
}

.stat-row .stat-value {
  font-weight: 500;
  color: var(--text-primary);
}

.coverage-legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.legend-item {
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  font-size: var(--font-size-xs);
  font-weight: 500;
}

.legend-item.coverage-high {
  background: var(--coverage-high-bg);
  color: var(--coverage-high);
}

.legend-item.coverage-medium {
  background: var(--coverage-medium-bg);
  color: var(--coverage-medium);
}

.legend-item.coverage-low {
  background: var(--coverage-low-bg);
  color: var(--coverage-low);
}

/* ===========================================
   File List
   =========================================== */

.file-list-container {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.file-list-header {
  display: grid;
  grid-template-columns: minmax(200px, 2fr) minmax(150px, 1fr) 100px 100px 100px;
  gap: 8px;
  padding: 12px 16px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-color);
  font-size: var(--font-size-xs);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.file-list-header > div {
  display: flex;
  align-items: center;
  gap: 4px;
}

.file-list-header .sortable {
  cursor: pointer;
  user-select: none;
}

.file-list-header .sortable:hover {
  color: var(--text-primary);
}

.file-list-header .sorted-ascending::after {
  content: ' ↑';
}

.file-list-header .sorted-descending::after {
  content: ' ↓';
}

.file-row {
  display: grid;
  grid-template-columns: minmax(200px, 2fr) minmax(150px, 1fr) 100px 100px 100px;
  gap: 8px;
  padding: 4px 16px;
  border-bottom: 1px solid var(--border-muted);
  align-items: center;
  transition: background var(--transition-fast);
}

.file-row:last-child {
  border-bottom: none;
}

.file-row:hover {
  background: var(--bg-hover);
}

/* Adjust grid when columns are hidden */
.no-functions.no-branches .file-list-header,
.no-functions.no-branches .file-row {
  grid-template-columns: minmax(200px, 2fr) minmax(150px, 1fr) 100px;
}

.no-functions:not(.no-branches) .file-list-header,
.no-functions:not(.no-branches) .file-row {
  grid-template-columns: minmax(200px, 2fr) minmax(150px, 1fr) 100px 100px;
}

.no-branches:not(.no-functions) .file-list-header,
.no-branches:not(.no-functions) .file-row {
  grid-template-columns: minmax(200px, 2fr) minmax(150px, 1fr) 100px 100px;
}

.file-row:nth-child(even) {
  background: rgba(56, 139, 253, 0.03);
}

.file-row:nth-child(even):hover {
  background: var(--bg-hover);
}

.col-name {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.file-icon {
  flex-shrink: 0;
  color: var(--text-muted);
}

.file-icon svg {
  display: block;
}

.file-row.directory .file-icon {
  color: var(--accent-blue);
}

.col-name a {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.col-name .no-link {
  color: var(--text-secondary);
}

.col-coverage {
  display: flex;
  align-items: center;
  gap: 12px;
}

.coverage-bar-container {
  flex: 1;
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  overflow: hidden;
}

.coverage-bar {
  height: 100%;
  border-radius: 3px;
  transition: width var(--transition-normal);
}

.coverage-bar.coverage-high { background: var(--coverage-high); }
.coverage-bar.coverage-medium { background: var(--coverage-medium); }
.coverage-bar.coverage-low { background: var(--coverage-low); }

.coverage-percent {
  font-weight: 600;
  font-size: var(--font-size-sm);
  min-width: 48px;
  text-align: right;
}

.col-lines, .col-functions, .col-branches {
  text-align: right;
  font-size: var(--font-size-sm);
}

.file-list-header .col-lines,
.file-list-header .col-functions,
.file-list-header .col-branches {
  justify-content: flex-end;
}

.stat-value {
  font-weight: 500;
}

.stat-separator {
  color: var(--text-muted);
  margin: 0 2px;
}

.stat-total {
  color: var(--text-secondary);
}

/* ===========================================
   Source Code View
   =========================================== */

.source-summary {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 16px;
}

.source-info h2 {
  margin: 0 0 8px 0;
  font-size: var(--font-size-xl);
  font-weight: 600;
  color: var(--text-primary);
  font-family: var(--font-mono);
}

.source-stats {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.source-stats .stat {
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
}

.source-stats .stat strong {
  margin-right: 4px;
}

.source-controls {
  display: flex;
  gap: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: var(--font-size-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.btn.btn-sm {
  padding: 4px 10px;
  font-size: var(--font-size-xs);
}

.btn-count {
  font-weight: 600;
}

.btn-toggle {
  text-decoration: line-through;
  opacity: 0.6;
}

.btn-toggle.show_coveredLine,
.btn-toggle.show_uncoveredLine,
.btn-toggle.show_partialCoveredLine,
.btn-toggle.show_excludedLine {
  text-decoration: none;
  opacity: 1;
}

.color-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.color-dot.covered { background: var(--coverage-high); }
.color-dot.uncovered { background: var(--coverage-low); }

.source-container {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.source-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-color);
  flex-wrap: wrap;
  gap: 12px;
}

.source-title {
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--text-primary);
}

.source-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.source-table-container {
  overflow-x: auto;
}

.source-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: var(--font-size-code);
  line-height: 1.2;
}

.source-table thead {
  position: sticky;
  top: 0;
  z-index: 10;
}

.source-table th {
  padding: 8px 12px;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-weight: 600;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
  white-space: nowrap;
}

.source-table th.col-lineno,
.source-table th.col-count,
.source-table th.col-branch {
  text-align: right;
}

.source-table td {
  padding: 4px 12px;
  vertical-align: middle;
  border-bottom: 1px solid var(--border-muted);
}

.source-table .col-lineno {
  background: var(--bg-tertiary);
  border-right: 1px solid var(--border-color);
  text-align: right;
  user-select: none;
  white-space: nowrap;
  width: 1%;
  padding: 4px 6px;
}

.source-table .col-lineno a {
  color: var(--text-muted);
  text-decoration: none;
  display: block;
  padding: 0;
}

.source-table .col-lineno a:hover {
  color: var(--accent-blue);
}

.source-table .col-branch,
.source-table .col-condition,
.source-table .col-decision,
.source-table .col-call {
  background: var(--bg-tertiary);
  border-right: 1px solid var(--border-color);
  text-align: center;
  width: 50px;
}

.source-table .col-count {
  text-align: right;
  white-space: nowrap;
  width: 1%;
  color: var(--text-muted);
  padding: 4px 6px;
}

.source-table .col-source {
  white-space: pre;
  padding-left: 16px;
}

/* Line coverage highlighting */
.source-line.coveredLine.show_coveredLine td.col-source,
.source-line.coveredLine.show_coveredLine td.col-count {
  background: var(--coverage-high-bg);
}

.source-line.uncoveredLine.show_uncoveredLine td.col-source,
.source-line.uncoveredLine.show_uncoveredLine td.col-count {
  background: var(--coverage-low-bg);
}

.source-line.partialCoveredLine.show_partialCoveredLine td.col-source,
.source-line.partialCoveredLine.show_partialCoveredLine td.col-count {
  background: var(--coverage-medium-bg);
}

.source-line.excludedLine.show_excludedLine td.col-source,
.source-line.excludedLine.show_excludedLine td.col-count {
  background: rgba(110, 118, 129, 0.15);
}

.hit-miss {
  color: var(--coverage-low);
  font-weight: bold;
}

.hit-excluded {
  color: var(--text-muted);
}

/* Branch/condition popup */
.branch-details, .condition-details, .decision-details, .call-details {
  position: relative;
}

.branch-summary, .condition-summary, .decision-summary, .call-summary {
  cursor: pointer;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-tertiary);
  display: inline-flex;
  align-items: center;
  gap: 2px;
  white-space: nowrap;
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  transition: all var(--transition-fast);
}

.branch-summary:hover, .condition-summary:hover, .decision-summary:hover, .call-summary:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

.branch-popup, .condition-popup, .decision-popup, .call-popup {
  position: absolute;
  top: 100%;
  left: 0;
  z-index: 100;
  min-width: 250px;
  padding: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  font-size: var(--font-size-xs);
  line-height: 1.6;
  text-align: left;
}

.function-name {
  font-weight: 600;
  color: var(--accent-blue);
  margin-bottom: 4px;
}

.branch-taken, .condition-covered, .decision-taken, .call-invoked {
  color: var(--coverage-high);
}

.branch-not-taken, .condition-not-covered, .decision-not-taken, .call-not-invoked {
  color: var(--coverage-low);
}

.branch-excluded, .condition-excluded, .decision-uncheckable, .call-excluded {
  color: var(--text-muted);
}

/* ===========================================
   Navigation
   =========================================== */

.nav-links {
  display: flex;
  gap: 12px;
}

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: var(--font-size-sm);
  transition: all var(--transition-fast);
}

.nav-link:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  text-decoration: none;
}

.nav-link svg {
  flex-shrink: 0;
}

/* ===========================================
   Functions Page
   =========================================== */

.summary-inline {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  padding: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
}

.summary-inline .summary-stat {
  display: flex;
  align-items: center;
  gap: 8px;
}

.summary-inline .stat-label {
  color: var(--text-secondary);
  font-size: var(--font-size-sm);
}

.summary-inline .stat-value {
  font-weight: 600;
  font-size: var(--font-size-md);
}

.summary-inline .stat-detail {
  color: var(--text-muted);
  font-size: var(--font-size-xs);
}

.functions-container {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.functions-header {
  display: grid;
  grid-template-columns: 2fr 120px 80px 80px;
  gap: 16px;
  padding: 12px 16px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-color);
  font-size: var(--font-size-xs);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.function-row {
  display: grid;
  grid-template-columns: 2fr 120px 80px 80px;
  gap: 16px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-muted);
  align-items: center;
  transition: background var(--transition-fast);
}

.function-row:hover {
  background: var(--bg-hover);
}

.function-row .col-function a {
  display: block;
}

.function-name {
  font-weight: 500;
  display: block;
}

.function-location {
  font-size: var(--font-size-xs);
  color: var(--text-muted);
}

.function-row .excluded {
  color: var(--text-muted);
  font-style: italic;
}

.function-row .not-called {
  color: var(--coverage-low);
}

.function-row .called {
  color: var(--coverage-high);
  font-weight: 500;
}

/* ===========================================
   Mobile Menu Button & Backdrop
   =========================================== */

/* Mobile menu button - hidden on desktop */
.mobile-menu-btn {
  display: none;
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  padding: 0;
  flex-shrink: 0;
  margin-right: 12px;
}

.mobile-menu-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.mobile-menu-btn svg {
  width: 18px;
  height: 18px;
}

/* Sidebar backdrop for mobile */
.sidebar-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 99;
  opacity: 0;
  visibility: hidden;
  transition: opacity var(--transition-normal), visibility var(--transition-normal);
}

/* ===========================================
   Responsive
   =========================================== */

@media (max-width: 1024px) {
  /* Mobile sidebar - hidden off-screen by default */
  .sidebar {
    transform: translateX(-100%);
    width: var(--sidebar-width);
    left: 0;
    top: 0;
    bottom: 0;
    border-radius: 0;
    transition: transform var(--transition-normal);
  }

  /* Show sidebar when mobile-open */
  .sidebar.mobile-open {
    transform: translateX(0);
  }

  /* Main content takes full width */
  .main-content {
    margin-left: 0 !important;
  }

  .main-header {
    margin: 0;
    border-radius: 0;
    top: 0;
  }

  /* Show hamburger menu button */
  .mobile-menu-btn {
    display: flex;
  }

  /* Hide sidebar toggle (pin) button and resize handle */
  .sidebar-toggle {
    display: none;
  }

  .sidebar-resize-handle {
    display: none;
  }

  /* Show backdrop when sidebar open */
  .sidebar.mobile-open ~ .sidebar-backdrop {
    opacity: 1;
    visibility: visible;
  }

  .content-wrapper {
    padding: 16px;
  }

  .file-list-header,
  .file-row {
    grid-template-columns: 1fr 120px 80px;
  }

  .col-functions,
  .col-branches {
    display: none;
  }
}

@media (max-width: 768px) {
  .summary-cards {
    grid-template-columns: 1fr;
  }

  .file-list-header,
  .file-row {
    grid-template-columns: 1fr 100px;
  }

  .col-lines,
  .col-functions,
  .col-branches {
    display: none !important;
  }

  .source-header {
    flex-direction: column;
    align-items: flex-start;
  }
}


/* ===========================================
   Syntax Highlighting (Dark Theme)
   =========================================== */

/* Dark theme syntax highlighting */
.c { color: #8b949e; font-style: italic; } /* Comment */
.k { color: #ff7b72; font-weight: bold; } /* Keyword */
.o { color: #79c0ff; } /* Operator */
.cm { color: #8b949e; font-style: italic; } /* Comment.Multiline */
.cp { color: #d29922; } /* Comment.Preproc */
.c1 { color: #8b949e; font-style: italic; } /* Comment.Single */
.cs { color: #8b949e; font-weight: bold; } /* Comment.Special */
.gd { color: #f85149; } /* Generic.Deleted */
.gi { color: #3fb950; } /* Generic.Inserted */
.kc { color: #79c0ff; } /* Keyword.Constant */
.kd { color: #ff7b72; } /* Keyword.Declaration */
.kn { color: #ff7b72; } /* Keyword.Namespace */
.kt { color: #ffa657; } /* Keyword.Type */
.m { color: #a5d6ff; } /* Literal.Number */
.s { color: #a5d6ff; } /* Literal.String */
.na { color: #79c0ff; } /* Name.Attribute */
.nb { color: #ffa657; } /* Name.Builtin */
.nc { color: #ffa657; font-weight: bold; } /* Name.Class */
.nf { color: #d2a8ff; } /* Name.Function */
.nn { color: #ffa657; } /* Name.Namespace */
.nt { color: #7ee787; } /* Name.Tag */
.nv { color: #79c0ff; } /* Name.Variable */
.ow { color: #ff7b72; font-weight: bold; } /* Operator.Word */
.s1 { color: #a5d6ff; } /* Literal.String.Single */
.s2 { color: #a5d6ff; } /* Literal.String.Double */

/* Light theme syntax highlighting */
:root[data-theme="light"] .c { color: #6e7781; }
:root[data-theme="light"] .k { color: #cf222e; }
:root[data-theme="light"] .o { color: #0550ae; }
:root[data-theme="light"] .cm { color: #6e7781; }
:root[data-theme="light"] .cp { color: #9a6700; }
:root[data-theme="light"] .c1 { color: #6e7781; }
:root[data-theme="light"] .cs { color: #6e7781; }
:root[data-theme="light"] .gd { color: #cf222e; }
:root[data-theme="light"] .gi { color: #1a7f37; }
:root[data-theme="light"] .kc { color: #0550ae; }
:root[data-theme="light"] .kd { color: #cf222e; }
:root[data-theme="light"] .kn { color: #cf222e; }
:root[data-theme="light"] .kt { color: #953800; }
:root[data-theme="light"] .m { color: #0550ae; }
:root[data-theme="light"] .s { color: #0a3069; }
:root[data-theme="light"] .na { color: #0550ae; }
:root[data-theme="light"] .nb { color: #953800; }
:root[data-theme="light"] .nc { color: #953800; }
:root[data-theme="light"] .nf { color: #8250df; }
:root[data-theme="light"] .nn { color: #953800; }
:root[data-theme="light"] .nt { color: #1a7f37; }
:root[data-theme="light"] .nv { color: #0550ae; }
:root[data-theme="light"] .ow { color: #cf222e; }
:root[data-theme="light"] .s1 { color: #0a3069; }
:root[data-theme="light"] .s2 { color: #0a3069; }

/* ===========================================
   Scrollbar
   =========================================== */

::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-primary);
}

    <script>
/* GCOVR Custom JavaScript - Tree View & Interactivity */

(function() {

  // Wait for DOM ready

    initSidebarResize();

    initFileTree();

  // ===========================================
  // Breadcrumb Links
  // ===========================================

  // Find a node in the tree by its link (HTML filename) and return
  // the full ancestor path as an array of nodes from root to target.
  function findPathInTree(nodes, targetLink) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.link === targetLink) {
        return [node];
      }
      if (node.children) {
        var childPath = findPathInTree(node.children, targetLink);
        if (childPath) {
          return [node].concat(childPath);
        }
      }
    }
    return null;
  }

  function initBreadcrumbs() {
    var currentSpan = document.querySelector('.breadcrumb .current');
    if (!currentSpan || !window.GCOVR_TREE_DATA) {
      if (currentSpan) currentSpan.classList.add('ready');
      return;
    }

    // Find current page in tree by its HTML filename — this is unambiguous
    // since each page only appears once in the tree.
    var currentPage = window.location.pathname.split('/').pop() || 'index.html';
    var treePath = findPathInTree(window.GCOVR_TREE_DATA, currentPage);

    if (!treePath || treePath.length === 0) {
      currentSpan.classList.add('ready');
      return;
    }

    // Build breadcrumb from the tree path (ancestor nodes → current node)
    var fragment = document.createDocumentFragment();
    var matchedSegments = [];

    for (var i = 0; i < treePath.length; i++) {
      var node = treePath[i];
      var isLast = (i === treePath.length - 1);

      if (i > 0) {
        var sep = document.createElement('span');
        sep.className = 'separator';
        sep.textContent = '/';
        fragment.appendChild(sep);
      }

      matchedSegments.push(node.name);

      if (node.link && !isLast) {
        var a = document.createElement('a');
        a.href = node.link;
        a.textContent = node.name;
        fragment.appendChild(a);
      } else {
        var span = document.createElement('span');
        span.className = 'current-file';
        span.textContent = node.name;
        fragment.appendChild(span);
      }
    }

    currentSpan.innerHTML = '';
    currentSpan.appendChild(fragment);
    currentSpan.classList.add('ready');

    // Update source-filename to match breadcrumb path
    var sourceFilename = document.querySelector('.source-filename');
    if (sourceFilename) {
      sourceFilename.textContent = matchedSegments.join('/');
    }
  }

  // ===========================================
  // Theme Toggle
  // ===========================================

  function initTheme() {
    const toggle = document.getElementById('theme-toggle');
    const iconSun = toggle ? toggle.querySelector('.icon-sun') : null;
    const iconMoon = toggle ? toggle.querySelector('.icon-moon') : null;

    // Get system preference
    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    // Get effective theme: saved preference or OS default
    function getEffectiveTheme() {
      var saved = localStorage.getItem('gcovr-theme');
      return (saved === 'light' || saved === 'dark') ? saved : getSystemTheme();
    }

    // Apply theme to document
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      if (iconSun) iconSun.style.display = (theme === 'dark') ? 'block' : 'none';
      if (iconMoon) iconMoon.style.display = (theme === 'light') ? 'block' : 'none';
    }

    // Apply current theme
    applyTheme(getEffectiveTheme());

    // Listen for system theme changes — only apply if no stored preference
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      var saved = localStorage.getItem('gcovr-theme');
      if (saved !== 'light' && saved !== 'dark') {
        applyTheme(getSystemTheme());
      }
    });

    // Toggle between light and dark on click
    if (toggle) {
      toggle.addEventListener('click', function() {
        var current = getEffectiveTheme();
        var next = (current === 'dark') ? 'light' : 'dark';
        localStorage.setItem('gcovr-theme', next);
        applyTheme(next);
      });
    }
  }

  // ===========================================
  // Tree Controls (Expand/Collapse All)
  // ===========================================

  function initTreeControls() {
    var expandBtn = document.getElementById('expand-all');
    var collapseBtn = document.getElementById('collapse-all');

    if (expandBtn) {
      expandBtn.addEventListener('click', function() {
        document.querySelectorAll('.tree-item').forEach(function(item) {
          if (!item.classList.contains('no-children')) {
            item.classList.add('expanded');
            var toggle = item.querySelector(':scope > .tree-item-header > .tree-folder-toggle');
            if (toggle) toggle.textContent = '−';
          }
        });
        saveExpandedFolders();
      });
    }

    if (collapseBtn) {
      collapseBtn.addEventListener('click', function() {
        document.querySelectorAll('.tree-item').forEach(function(item) {
          item.classList.remove('expanded');
          var toggle = item.querySelector(':scope > .tree-item-header > .tree-folder-toggle');
          if (toggle) toggle.textContent = '+';
        });
        saveExpandedFolders();
      });
    }
  }

  // ===========================================
  // Sidebar Toggle
  // ===========================================

  function initSidebar() {
    const sidebar = document.getElementById('sidebar');
    const toggle = document.getElementById('sidebar-toggle');
    const header = sidebar ? sidebar.querySelector('.sidebar-header') : null;

    if (!sidebar) return;

    // Load saved state
    const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
    if (isCollapsed) {
      sidebar.classList.add('collapsed');
    }

    // Toggle button
    if (toggle) {
      toggle.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
        sidebar.classList.remove('hover-expand');
        var isNowCollapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebar-collapsed', isNowCollapsed);
        // Restore custom width when un-collapsing
        if (!isNowCollapsed) {
          var savedWidth = localStorage.getItem('gcovr-sidebar-width');
          if (savedWidth) {
            document.documentElement.style.setProperty('--sidebar-width', savedWidth + 'px');
          }
        }
      });
    }

    // Hover expand - expands when hovering sidebar content (not header or no-expand zones)
    var hoverTimeout = null;
    var HOVER_DELAY = 150; // ms delay before expanding
    var isOverContent = false;

    // Check if element is within a no-expand zone
    function isInNoExpandZone(el) {
      while (el && el !== sidebar) {
        if (el.classList && el.classList.contains('no-expand')) {
          return true;
        }
        el = el.parentElement;
      }
      return false;
    }

    function scheduleExpand() {
      if (hoverTimeout) return; // already scheduled
      if (sidebar.classList.contains('hover-expand')) return; // already expanded
      hoverTimeout = setTimeout(function() {
        if (isOverContent) {
          sidebar.classList.add('hover-expand');
        }
        hoverTimeout = null;
      }, HOVER_DELAY);
    }

    function cancelExpand() {
      if (hoverTimeout) {
        clearTimeout(hoverTimeout);
        hoverTimeout = null;
      }
      sidebar.classList.remove('hover-expand');
    }

    sidebar.addEventListener('mouseenter', function(e) {
      if (!sidebar.classList.contains('collapsed')) return;
      // Check if entering over content area (not header or no-expand zones)
      if (!header.contains(e.target) && !isInNoExpandZone(e.target)) {
        isOverContent = true;
        scheduleExpand();
      }
    });

    sidebar.addEventListener('mousemove', function(e) {
      if (!sidebar.classList.contains('collapsed')) return;
      var wasOverContent = isOverContent;
      isOverContent = !header.contains(e.target) && !isInNoExpandZone(e.target);

      if (isOverContent && !wasOverContent && !sidebar.classList.contains('hover-expand')) {
        scheduleExpand();
      }
    });

    sidebar.addEventListener('mouseleave', function() {
      isOverContent = false;
      cancelExpand();
    });
  }

  // ===========================================
  // Sidebar Resize
  // ===========================================

  function initSidebarResize() {
    var sidebar = document.getElementById('sidebar');
    var handle = document.getElementById('sidebar-resize-handle');
    if (!sidebar || !handle) return;

    var MIN_WIDTH = 200;
    var startX, startWidth;

    // Restore saved width
    var savedWidth = localStorage.getItem('gcovr-sidebar-width');
    if (savedWidth && !sidebar.classList.contains('collapsed')) {
      var w = parseInt(savedWidth, 10);
      if (w >= MIN_WIDTH) {
        document.documentElement.style.setProperty('--sidebar-width', w + 'px');
      }
    }

    function getMaxWidth() {
      return Math.floor(window.innerWidth * 0.5);
    }

    function onMouseMove(e) {
      var newWidth = startWidth + (e.clientX - startX);
      var maxW = getMaxWidth();
      if (newWidth < MIN_WIDTH) newWidth = MIN_WIDTH;
      if (newWidth > maxW) newWidth = maxW;
      document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
    }

    function onMouseUp() {
      document.body.classList.remove('sidebar-resizing');
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      // Save the current width
      var computed = parseInt(getComputedStyle(sidebar).width, 10);
      localStorage.setItem('gcovr-sidebar-width', computed);
    }

    handle.addEventListener('mousedown', function(e) {
      if (sidebar.classList.contains('collapsed')) return;
      e.preventDefault();
      startX = e.clientX;
      startWidth = parseInt(getComputedStyle(sidebar).width, 10);
      document.body.classList.add('sidebar-resizing');
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    // Double-click to reset to default width
    var DEFAULT_WIDTH = 320;
    handle.addEventListener('dblclick', function() {
      if (sidebar.classList.contains('collapsed')) return;
      document.documentElement.style.setProperty('--sidebar-width', DEFAULT_WIDTH + 'px');
      localStorage.setItem('gcovr-sidebar-width', DEFAULT_WIDTH);
    });
  }

  // ===========================================
  // Mobile Menu
  // ===========================================

  function initMobileMenu() {
    var sidebar = document.getElementById('sidebar');
    var menuBtn = document.getElementById('mobile-menu-btn');
    var backdrop = document.getElementById('sidebar-backdrop');

    if (!menuBtn || !sidebar) return;

    // Open sidebar on hamburger click
    menuBtn.addEventListener('click', function() {
      sidebar.classList.add('mobile-open');

    // Close on backdrop click
    if (backdrop) {
      backdrop.addEventListener('click', function() {
        sidebar.classList.remove('mobile-open');

    // Close when clicking a navigation link
    sidebar.addEventListener('click', function(e) {
      if (e.target.closest('a[href]')) {
        sidebar.classList.remove('mobile-open');
      }

    // Close on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && sidebar.classList.contains('mobile-open')) {
        sidebar.classList.remove('mobile-open');
      }
    });
  }

  // ===========================================
  // File Tree - Load from tree.json
  // ===========================================

  function initFileTree() {
    var treeContainer = document.getElementById('file-tree');
    if (!treeContainer) return;

    // Check for embedded tree data first (works for local file:// access)
    if (window.GCOVR_TREE_DATA) {
      window.GCOVR_TREE_DATA = normalizeTree(window.GCOVR_TREE_DATA);
      deduplicateTree(window.GCOVR_TREE_DATA);
      collapseSingleChildDirs(window.GCOVR_TREE_DATA);
      deduplicateTree(window.GCOVR_TREE_DATA);
      renderTree(treeContainer, window.GCOVR_TREE_DATA);
      return;

      .then(function(response) {

        return response.json();

      .then(function(tree) {
        window.GCOVR_TREE_DATA = normalizeTree(tree);
        deduplicateTree(window.GCOVR_TREE_DATA);
        collapseSingleChildDirs(window.GCOVR_TREE_DATA);
        deduplicateTree(window.GCOVR_TREE_DATA);
        renderTree(treeContainer, window.GCOVR_TREE_DATA);
        // Re-run breadcrumbs and search now that the tree exists
        initBreadcrumbs();
        initSearch();
      })
      .catch(function(err) {

      });

  // Collapse single-child directory chains: if a directory has exactly
  // one child and that child is also a directory, absorb the grandchildren.
  // e.g. include > boost > capy > [items] becomes include > [items]
  function collapseSingleChildDirs(nodes) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!node.isDirectory || !node.children) continue;
      while (node.children.length === 1 && node.children[0].isDirectory &&
             node.children[0].children && node.children[0].children.length > 0) {
        var child = node.children[0];
        if (!node.link && child.link) node.link = child.link;
        node.children = child.children;
      }
      collapseSingleChildDirs(node.children);
    }
  }

  // Deduplicate tree: when a node has a child with the same name
  // (e.g. include > include), merge the child's children upward.
  // This happens when gcovr directory pages list entries with paths
  // that include the parent directory name.
  function deduplicateTree(nodes) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!node.children || node.children.length === 0) continue;
      for (var j = node.children.length - 1; j >= 0; j--) {
        var child = node.children[j];
        if (child.name === node.name && child.isDirectory) {
          node.children.splice(j, 1);
          if (!node.link && child.link) node.link = child.link;
          if (!node.coverage && child.coverage) node.coverage = child.coverage;
          if (!node.coverageClass && child.coverageClass) node.coverageClass = child.coverageClass;
          if (child.children) {
            for (var k = 0; k < child.children.length; k++) {
              node.children.push(child.children[k]);
            }
          }
        }
      }
      deduplicateTree(node.children);
    }
  }

  // Normalize tree: expand multi-segment node names (e.g. "capy/buffers")
  // into proper nested directory structures so the tree and breadcrumbs
  // display correctly.
  function normalizeTree(nodes) {
    if (!nodes || nodes.length === 0) return nodes;

    var groups = {};
    var order = [];

    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      var slashIdx = node.name.indexOf('/');

      if (slashIdx === -1) {
        // Simple name — add directly or merge with existing group
        if (groups[node.name]) {
          var existing = groups[node.name];
          if (node.link) existing.link = node.link;
          if (node.coverage) existing.coverage = node.coverage;
          if (node.coverageClass) existing.coverageClass = node.coverageClass;
          if (node.children && node.children.length > 0) {
            existing.children = (existing.children || []).concat(node.children);
          }
        } else {
          var copy = {};
          for (var key in node) {
            if (node.hasOwnProperty(key)) copy[key] = node[key];
          }
          groups[node.name] = copy;
          order.push(node.name);
        }
      } else {
        // Multi-segment name — split on first '/' and group
        var prefix = node.name.substring(0, slashIdx);
        var rest = node.name.substring(slashIdx + 1);

        if (!groups[prefix]) {
          groups[prefix] = {
            name: prefix,
            isDirectory: true,
            children: []
          };
          order.push(prefix);
        }
        if (!groups[prefix].children) groups[prefix].children = [];

        // Create child node with remaining path as name
        var childNode = {};
        for (var key in node) {
          if (node.hasOwnProperty(key)) childNode[key] = node[key];
        }
        childNode.name = rest;
        groups[prefix].children.push(childNode);
      }
    }

    // Build result with recursive normalization
    var result = [];
    for (var i = 0; i < order.length; i++) {
      var node = groups[order[i]];
      if (node.children && node.children.length > 0) {
        node.children = normalizeTree(node.children);
      }
      result.push(node);
    }
    return result;
  }

  // Save expanded folder paths to localStorage
  function saveExpandedFolders() {
    var paths = [];
    document.querySelectorAll('.tree-item.expanded[data-tree-path]').forEach(function(el) {
      paths.push(el.getAttribute('data-tree-path'));
    });
    localStorage.setItem('gcovr-expanded-folders', JSON.stringify(paths));
  }

  function renderTree(container, tree) {
    container.innerHTML = '';

    if (!tree || tree.length === 0) {
      container.innerHTML = '<div class="tree-loading">No files found</div>';
      return;
    }

    tree.forEach(function(item) {
      container.appendChild(createTreeItem(item, ''));
    });

    // Auto-expand to current file and highlight it
    expandToCurrentFile(container);
  }

  function expandToCurrentFile(container) {
    // Get current page filename
    var currentPage = window.location.pathname.split('/').pop() || 'index.html';

    // Find the link matching current page
    var currentLink = container.querySelector('a[href="' + currentPage + '"]');

    if (currentLink) {
      // Mark as active
      var treeItem = currentLink.closest('.tree-item');
      if (treeItem) {
        treeItem.classList.add('active');
      }

      // Expand all parent folders
      var parent = currentLink.closest('.tree-children');
      while (parent) {
        var parentItem = parent.closest('.tree-item');
        if (parentItem) {
          parentItem.classList.add('expanded');
          var toggle = parentItem.querySelector(':scope > .tree-item-header > .tree-folder-toggle');
          if (toggle) toggle.textContent = '−';
        }
        parent = parentItem ? parentItem.parentElement.closest('.tree-children') : null;
      }
    }

    // Restore previously expanded folders from localStorage
    try {
      var saved = localStorage.getItem('gcovr-expanded-folders');
      if (saved) {
        var paths = JSON.parse(saved);
        paths.forEach(function(path) {
          var el = container.querySelector('.tree-item[data-tree-path="' + CSS.escape(path) + '"]');
          if (el && !el.classList.contains('no-children')) {
            el.classList.add('expanded');
            var toggle = el.querySelector(':scope > .tree-item-header > .tree-folder-toggle');
            if (toggle) toggle.textContent = '−';
          }
        });
      }
    } catch (e) {
      // Ignore localStorage errors
    }

    // Scroll active item into view instantly
    if (currentLink) {
      currentLink.scrollIntoView({ block: 'center', behavior: 'instant' });
    }
  }

  // Clean relative path prefixes like '../../../' from names
  function cleanPathName(name) {
    if (!name) return 'unknown';
    // Remove leading ./ or ../
    while (name.indexOf('./') === 0 || name.indexOf('../') === 0) {
      if (name.indexOf('./') === 0) {
        name = name.substring(2);
      } else if (name.indexOf('../') === 0) {
        name = name.substring(3);
      }
    }
    return name || 'unknown';
  }

  // Get just the filename from a path
  function getDisplayName(name) {
    var cleaned = cleanPathName(name);
    var lastSlash = cleaned.lastIndexOf('/');
    return lastSlash >= 0 ? cleaned.substring(lastSlash + 1) : cleaned;
  }

  function createTreeItem(item, parentPath) {
    var hasChildren = item.children && item.children.length > 0;
    var isDirectory = item.isDirectory || hasChildren;
    var cleanedName = cleanPathName(item.name);
    var treePath = parentPath ? (parentPath + '/' + cleanedName) : cleanedName;

    var div = document.createElement('div');
    div.className = 'tree-item' + (isDirectory ? ' is-folder' : '') + (hasChildren ? '' : ' no-children');
    div.setAttribute('data-tree-path', treePath);

    var header = document.createElement('div');
    header.className = 'tree-item-header';
    var toggle = null;

    // Toggle button (+/-) for folders with children
    if (hasChildren) {
      toggle = document.createElement('button');
      toggle.className = 'tree-folder-toggle';
      toggle.textContent = '+';
      toggle.setAttribute('aria-label', 'Toggle folder');
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        e.preventDefault();
        var isExpanded = div.classList.toggle('expanded');
        toggle.textContent = isExpanded ? '−' : '+';
        saveExpandedFolders();
      });
      header.appendChild(toggle);

      // Make entire header clickable to expand/collapse
      header.style.cursor = 'pointer';
      header.addEventListener('click', function(e) {
        // If clicking directly on a link, let it navigate
        if (e.target.closest('a')) return;
        e.preventDefault();
        var isExpanded = div.classList.toggle('expanded');
        toggle.textContent = isExpanded ? '−' : '+';
        saveExpandedFolders();
      });
    } else {
      var spacer = document.createElement('span');
      spacer.className = 'tree-spacer';
      header.appendChild(spacer);
    }

    // Icon - different for folders vs files
    var icon = document.createElement('span');
    if (isDirectory) {
      icon.className = 'tree-icon tree-icon-folder';
      icon.innerHTML = '<svg viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M1.75 1A1.75 1.75 0 000 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0016 13.25v-8.5A1.75 1.75 0 0014.25 3H7.5a.25.25 0 01-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75z"/></svg>';
    } else {
      icon.className = 'tree-icon tree-icon-file';
      icon.innerHTML = '<svg viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M3.75 1.5a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 00.25-.25V6h-2.75A1.75 1.75 0 019 4.25V1.5H3.75zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-2.938-2.938zM2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0113.25 16h-9.5A1.75 1.75 0 012 14.25V1.75z"/></svg>';
    }
    header.appendChild(icon);

    // Label (with link if available)
    // Clean the display name to remove relative path prefixes like '../../../'
    var displayName = getDisplayName(item.name);
    var tooltipText = cleanPathName(item.fullPath || item.name);
    var label = document.createElement('span');
    label.className = 'tree-label';
    label.title = tooltipText;
    if (item.link) {
      var link = document.createElement('a');
      link.href = item.link;
      link.textContent = displayName;
      link.title = tooltipText;
      label.appendChild(link);
    } else {
      label.textContent = displayName;
    }
    header.appendChild(label);

    div.appendChild(header);

    // Children container (for expand/collapse)
    if (hasChildren) {
      var childrenWrapper = document.createElement('div');
      childrenWrapper.className = 'tree-children';

      var childrenInner = document.createElement('div');
      childrenInner.className = 'tree-children-inner';
      item.children.forEach(function(child) {
        childrenInner.appendChild(createTreeItem(child, treePath));
      });

      childrenWrapper.appendChild(childrenInner);
      div.appendChild(childrenWrapper);
    }

    return div;
  }

  // ===========================================
  // Search
  // ===========================================

  function initSearch() {
    const searchInput = document.getElementById('file-search');
    const fileTree = document.getElementById('file-tree');
    const clearBtn = document.getElementById('search-clear');
    const searchContainer = searchInput ? searchInput.closest('.sidebar-search') : null;
    if (!searchInput || !fileTree) return;

    // Store pre-search expanded state so we can restore it
    var preSearchExpanded = null;

    // Create no-results message
    var noResults = document.createElement('div');
    noResults.className = 'search-no-results';
    noResults.textContent = 'No matching files';
    noResults.style.display = 'none';
    fileTree.appendChild(noResults);

    function updateClearButton() {
      if (searchContainer) {
        searchContainer.classList.toggle('has-query', searchInput.value.trim() !== '');
      }
    }

    // Clear button
    if (clearBtn) {
      clearBtn.addEventListener('click', function() {
        searchInput.value = '';
        sessionStorage.removeItem('gcovr-search');
        updateClearButton();
        performSearch('');
        searchInput.focus();
      });
    }

    var debounceTimer = null;
    searchInput.addEventListener('input', function() {
      updateClearButton();
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        var val = searchInput.value;
        if (val.trim() !== '') {
          sessionStorage.setItem('gcovr-search', val);
        } else {
          sessionStorage.removeItem('gcovr-search');
        }
        performSearch(val);
      }, 150);
    });

    // Restore search state from sessionStorage on page load (synchronous
    // since initFileTree has already built the tree before initSearch runs)
    var savedSearch = sessionStorage.getItem('gcovr-search');
    if (savedSearch) {
      searchInput.value = savedSearch;
      updateClearButton();
      performSearch(savedSearch);
    }

    function performSearch(value) {
      var query = value.toLowerCase().trim();
      var allItems = fileTree.querySelectorAll('.tree-item');

      // Clear all highlights
      fileTree.querySelectorAll('.search-highlight').forEach(function(mark) {
        var parent = mark.parentNode;
        parent.replaceChild(document.createTextNode(mark.textContent), mark);
        parent.normalize();
      });

      // If query is empty, restore original state
      if (query === '') {
        noResults.style.display = 'none';
        allItems.forEach(function(item) {
          item.style.display = '';
          item.classList.remove('search-match');
        });
        // Restore pre-search expanded state
        if (preSearchExpanded !== null) {
          allItems.forEach(function(item) {
            var path = item.getAttribute('data-tree-path');
            var toggle = item.querySelector(':scope > .tree-item-header > .tree-folder-toggle');
            if (toggle) {
              if (preSearchExpanded.indexOf(path) >= 0) {
                item.classList.add('expanded');
                toggle.textContent = '\u2212';
              } else {
                item.classList.remove('expanded');
                toggle.textContent = '+';
              }
            }
          });
          preSearchExpanded = null;
        }
        return;
      }

      // Save expanded state before first search
      if (preSearchExpanded === null) {
        preSearchExpanded = [];
        allItems.forEach(function(item) {
          if (item.classList.contains('expanded')) {
            preSearchExpanded.push(item.getAttribute('data-tree-path'));
          }
        });
      }

      // Determine which items match (check full path and display name)
      var matchSet = new Set();

      allItems.forEach(function(item) {
        var path = (item.getAttribute('data-tree-path') || '').toLowerCase();
        var label = item.querySelector(':scope > .tree-item-header > .tree-label');
        var text = label ? label.textContent.toLowerCase() : '';
        if (path.includes(query) || text.includes(query)) {
          matchSet.add(item);
        }
      });

      // Also mark all ancestor items of matches as visible
      var visibleSet = new Set(matchSet);
      matchSet.forEach(function(item) {
        var parent = item.parentElement;
        while (parent && parent !== fileTree) {
          if (parent.classList && parent.classList.contains('tree-item')) {
            visibleSet.add(parent);
          }
          parent = parent.parentElement;
        }
      });

      // Apply visibility, expand parents of matches, highlight text
      var anyVisible = false;
      allItems.forEach(function(item) {
        var isVisible = visibleSet.has(item);
        item.style.display = isVisible ? '' : 'none';
        item.classList.toggle('search-match', matchSet.has(item));

        if (isVisible) {
          anyVisible = true;
          // Auto-expand folders that contain matches
          var toggle = item.querySelector(':scope > .tree-item-header > .tree-folder-toggle');
          if (toggle && visibleSet.has(item) && !matchSet.has(item) || (toggle && matchSet.has(item) && item.classList.contains('is-folder'))) {
            item.classList.add('expanded');
            toggle.textContent = '\u2212';
          }
        }

        // Highlight matched text in label
        if (matchSet.has(item)) {
          var label = item.querySelector(':scope > .tree-item-header > .tree-label');
          if (label) {
            highlightText(label, query);
          }
        }
      });

      noResults.style.display = anyVisible ? 'none' : '';
    }

    function highlightText(container, query) {
      // Walk text nodes inside the label (may be inside an <a> tag)
      var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
      var textNodes = [];
      while (walker.nextNode()) {
        textNodes.push(walker.currentNode);
      }
      textNodes.forEach(function(node) {
        var text = node.textContent;
        var lowerText = text.toLowerCase();
        var idx = lowerText.indexOf(query);
        if (idx === -1) return;

        var frag = document.createDocumentFragment();
        var lastIdx = 0;
        while (idx !== -1) {
          if (idx > lastIdx) {
            frag.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
          }
          var mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = text.substring(idx, idx + query.length);
          frag.appendChild(mark);
          lastIdx = idx + query.length;
          idx = lowerText.indexOf(query, lastIdx);
        }
        if (lastIdx < text.length) {
          frag.appendChild(document.createTextNode(text.substring(lastIdx)));
        }
        node.parentNode.replaceChild(frag, node);
      });
    }
  }

  // ===========================================
  // Sorting
  // ===========================================

  function initSorting() {
    const headers = document.querySelectorAll('.file-list-header .sortable, .functions-header .sortable');

    headers.forEach(function(header) {
      header.addEventListener('click', function() {
        const sortKey = this.dataset.sort;
        const isAscending = this.classList.contains('sorted-ascending');

        // Remove sorted class from all headers
        headers.forEach(function(h) {
          h.classList.remove('sorted-ascending', 'sorted-descending');
        });

        // Toggle sort direction
        this.classList.add(isAscending ? 'sorted-descending' : 'sorted-ascending');

        // Sort the list
        sortList(sortKey, !isAscending);
      });
    });

    // Initial sort: directories first, then by filename
    sortList('filename', true);
  }

  function sortList(key, ascending) {
    const container = document.getElementById('file-list') || document.querySelector('.functions-body');
    if (!container) return;

    const rows = Array.from(container.children);

    rows.sort(function(a, b) {
      // Directories always come first
      const aIsDir = a.classList.contains('directory');
      const bIsDir = b.classList.contains('directory');
      if (aIsDir && !bIsDir) return -1;
      if (!aIsDir && bIsDir) return 1;

      let aVal = a.dataset[key] || a.querySelector('[data-sort]')?.dataset.sort || '';
      let bVal = b.dataset[key] || b.querySelector('[data-sort]')?.dataset.sort || '';

      // Try to parse as numbers
      const aNum = parseFloat(aVal);
      const bNum = parseFloat(bVal);

      if (!isNaN(aNum) && !isNaN(bNum)) {
        return ascending ? aNum - bNum : bNum - aNum;
      }

      // String comparison
      return ascending ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    });

    rows.forEach(function(row) {
      container.appendChild(row);
    });
  }

  // ===========================================
  // Toggle Buttons (Coverage Lines)
  // ===========================================

  function initToggleButtons() {
    const buttons = document.querySelectorAll('.button_toggle_coveredLine, .button_toggle_uncoveredLine, .button_toggle_partialCoveredLine, .button_toggle_excludedLine');

    buttons.forEach(function(button) {
      button.addEventListener('click', function() {
        const lineClass = this.value;
        const showClass = 'show_' + lineClass;

        // Toggle the button state
        this.classList.toggle(showClass);

        // Toggle visibility of lines
        const lines = document.querySelectorAll('.' + lineClass);
        lines.forEach(function(line) {
          line.classList.toggle(showClass);
        });
      });
    });

    // Also handle simpler toggle buttons
    const simpleToggles = document.querySelectorAll('.btn-toggle');
    simpleToggles.forEach(function(button) {
      button.addEventListener('click', function() {
        // Use data attribute to get line class (persists after toggle)
        const lineClass = this.dataset.lineClass;
        if (!lineClass) return;

        const showClass = 'show_' + lineClass;
        this.classList.toggle(showClass);
        const lines = document.querySelectorAll('.' + lineClass);
        lines.forEach(function(line) {
          line.classList.toggle(showClass);
        });
      });
    });
  }

})();    </script>
